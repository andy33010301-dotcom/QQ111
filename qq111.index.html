<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ田手做甜點 - 驚喜大輪盤</title>
    <style>
        :root {
            --primary-color: #A28FC5; /* 芋泥紫 */
            --secondary-color: #FFF9E3; /* 奶酪白 */
            --accent-color: #FFB347; /* 芒果黃 */
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--secondary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #5D4037;
        }
        .container { position: relative; width: 320px; height: 320px; }
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--primary-color);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #A28FC5 0deg 72deg, #B8A9D6 72deg 144deg, 
                #A28FC5 144deg 216deg, #B8A9D6 216deg 288deg, 
                #A28FC5 288deg 360deg
            );
        }
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            z-index: 10;
        }
        .btn-spin {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(162, 143, 197, 0.4);
        }
        .result-popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2); text-align: center;
            z-index: 20; width: 80%;
        }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 10px;">🍧 QQ田 驚喜抽抽樂</h2>
    <p style="margin-bottom: 20px;">今天想加什麼好料？轉轉看！</p>
    <div class="container">
        <svg class="pointer" viewBox="0 0 100 100">
            <polygon points="50,0 100,50 50,100 0,50" fill="#FFB347"/>
        </svg>
        <canvas id="wheel" width="320" height="320"></canvas>
    </div>
    <button class="btn-spin" onclick="spinWheel()">點我開始旋轉！</button>
    <div id="popup" class="result-popup">
        <h3 id="prize-text">恭喜獲得！</h3>
        <button onclick="document.getElementById('popup').style.display='none'">太棒了！</button>
    </div>
    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const prizes = ["買大冰折10元", "免費加珍珠", "下次消費9折", "隱藏版淋醬", "免費加芋圓"];
        const colors = ["#A28FC5", "#B8A9D6", "#D1C4E9", "#B39DDB", "#9575CD"];
        // 繪製輪盤扇區與文字
        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            prizes.forEach((prize, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(160, 160);
                ctx.arc(160, 160, 160, i * arc, (i + 1) * arc);
                ctx.fill();
                
                ctx.save();
                ctx.fillStyle = "white";
                ctx.translate(160, 160);
                ctx.rotate(i * arc + arc / 2);
                ctx.fillText(prize, 70, 10);
                ctx.restore();
            });
        }
        drawWheel();
        let currentRotation = 0;
        function spinWheel() {
            const randomSpin = Math.floor(Math.random() * 360) + 1440; // 旋轉至少4圈
            currentRotation += randomSpin;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const actualDeg = currentRotation % 360;
                const prizeIndex = Math.floor((360 - actualDeg) / (360 / prizes.length)) % prizes.length;
                document.getElementById('prize-text').innerText = "恭喜獲得：" + prizes[prizeIndex];
                document.getElementById('popup').style.display = 'block';
            }, 4000);
        }
    </script>
</body>
</html>
